plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

android {
  namespace 'expo.modules.localvectorizer'

  defaultConfig {
    minSdk 24
    externalNativeBuild {
      cmake {
        cppFlags '-std=c++17'
      }
    }
  }

  externalNativeBuild {
    cmake {
      path file('CMakeLists.txt')
    }
  }
}
