name: Build Android app

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build installable APK and app bundle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up Rust and Android FFI targets
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "ndk;27.0.12077973"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"

      - name: Build Rust Android vectorizer libraries
        run: npm run tracer:build:android

      - name: Generate Android project
        run: npx expo prebuild --platform android --no-install

      - name: Configure Gradle JVM memory
        run: sed -i 's/org\.gradle\.jvmargs=.*/org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError/' android/gradle.properties

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Build Android artifacts
        working-directory: android
        run: ./gradlew assembleRelease bundleRelease --no-daemon

      - name: Upload installable APK
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v6
        with:
          name: notes-android-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload Android App Bundle
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v6
        with:
          name: notes-android-bundle
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub release
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          short_sha="$(printf '%s' '${{ github.sha }}' | cut -c1-7)"
          tag="notes-android-${{ github.run_number }}-${short_sha}"
          gh release create "$tag" \
            --title "Android release $tag" \
            --generate-notes \
            android/app/build/outputs/apk/release/app-release.apk \
            android/app/build/outputs/bundle/release/app-release.aab
