name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Type check, lint & bundle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Export bundle (web)
        run: npx expo export --platform web

      - name: Start web server
        run: |
          cd dist
          npx http-server -p 8080 -g &
          sleep 2
          echo "✓ Web server running at http://localhost:8080"
        if: always()

      - name: Upload bundle as artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-bundle
          path: dist/
          retention-days: 7
        if: always()
