name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: pages-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy main/PR preview to gh-pages
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        if: github.event_name == 'push' || github.event.action != 'closed'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: github.event_name == 'push' || github.event.action != 'closed'
        run: npm ci

      - name: Determine deployment target
        id: target
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "path=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "path=." >> "$GITHUB_OUTPUT"
          fi

      - name: Export bundle (web)
        if: github.event_name == 'push' || github.event.action != 'closed'
        env:
          EXPO_BASE_PATH: ${{ github.event_name == 'pull_request' && format('/pr-{0}/', github.event.pull_request.number) || '/' }}
        run: npx expo export --platform web

      - name: Rewrite web asset URLs for subpath hosting
        if: github.event_name == 'push' || github.event.action != 'closed'
        run: |
          node -e "const fs=require('fs');const file='dist/index.html';const html=fs.readFileSync(file,'utf8');const updated=html.replace(/(href|src)=\\\"\\/(?!\\/)/g,'$1=\\\"./');fs.writeFileSync(file,updated);"

      - name: Checkout gh-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages || true
          if git show-ref --quiet refs/remotes/origin/gh-pages; then
            git worktree add gh-pages-worktree origin/gh-pages
          else
            git worktree add -b gh-pages gh-pages-worktree
            cd gh-pages-worktree
            git rm -rf . >/dev/null 2>&1 || true
            touch .nojekyll
            git add .nojekyll
            git commit -m "Initialize gh-pages branch"
            git push origin gh-pages
          fi

      - name: Update deployed content
        run: |
          cd gh-pages-worktree
          target="${{ steps.target.outputs.path }}"

          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ github.event.action }}" = "closed" ]; then
            rm -rf "$target"
          elif [ "$target" = "." ]; then
            find . -mindepth 1 -maxdepth 1 ! -name ".git" ! -name "pr-*" -exec rm -rf {} +
            cp -a ../dist/. .
          else
            rm -rf "$target"
            mkdir -p "$target"
            cp -a ../dist/. "$target/"
          fi

          touch .nojekyll

      - name: Commit and push changes
        run: |
          cd gh-pages-worktree
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No Pages changes to publish."
            exit 0
          fi

          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ github.event.action }}" = "closed" ]; then
            git commit -m "Remove preview for PR #${{ github.event.pull_request.number }}"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            git commit -m "Update preview for PR #${{ github.event.pull_request.number }}"
          else
            git commit -m "Update main site from ${{ github.sha }}"
          fi
          git push origin HEAD:gh-pages

  pr-comment:
    name: Comment PR with preview URL
    needs: deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const repo = context.repo;
            const prNumber = context.issue.number;
            const owner = repo.owner;
            const repoName = repo.repo;
            const previewUrl = `https://${owner}.github.io/${repoName}/pr-${prNumber}/`;

            github.rest.issues.createComment({
              owner: repo.owner,
              repo: repo.repo,
              issue_number: prNumber,
              body: `🚀 **Preview Ready!**\n\n[View PR Preview](${previewUrl})`
            });
